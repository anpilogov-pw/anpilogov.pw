version: "3.9"

services:
  wordpress:
    image: wordpress:php8.3-apache
    container_name: wp_dev
    restart: always
    ports:
      - "8085:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_pass
      WORDPRESS_DB_NAME: wp_dev
    volumes:
      - ./wp_data:/var/www/html
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini
      - ./theme/anpilogov-pw:/var/www/html/wp-content/themes/anpilogov-pw
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: wp_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: wp_dev
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_pass
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wp_pma
    restart: always
    ports:
      - "8084:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_pass
    volumes:
      - ./php.ini:/usr/local/etc/php/conf.d/uploads.ini
    depends_on:
      - db

volumes:
  db_data:
